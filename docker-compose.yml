version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: abde
      POSTGRES_PASSWORD: abde
      POSTGRES_DB: abde_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  pgdata:
  qdrant_data: